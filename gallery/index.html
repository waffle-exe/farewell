        <!-- Header Decor -->

        <!-- LOG IN SECTION -->

            <div id="errorMessage" class="hidden bg-red-900/30 text-red-400 p-3 rounded-xl mb-6 text-sm text-center border border-red-800">
                Invalid Ticket Number, Phone, or Name. Please try again.
            </div>

            <form id="authForm" class="space-y-5">
                <div>
                    <label for="ticketId" class="block text-sm font-medium text-gray-300 mb-1">Ticket Number</label>
                    <div class="flex">
                        <span class="inline-flex items-center px-4 rounded-l-xl border border-r-0 border-gray-600 bg-gray-800 text-yellow-500 font-semibold">
                            PHY-
                        </span>
                        <input type="text" id="ticketId" placeholder="9202" class="w-full px-4 py-3 rounded-r-xl bg-gray-900 border border-gray-600 text-white focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 outline-none transition-all" required>
                    </div>
                </div>

                <div>
                    <label for="name" class="block text-sm font-medium text-gray-300 mb-1">Name</label>
                    <input type="text" id="name" placeholder="First Name or Full Name" class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-gray-600 text-white focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 outline-none transition-all" required>
                </div>

                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-300 mb-1">Registered Phone</label>
                    <input type="tel" id="phone" placeholder="Enter phone number" class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-gray-600 text-white focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 outline-none transition-all" required>
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 hover:to-yellow-500 text-black font-bold py-3 px-4 rounded-xl shadow-lg shadow-yellow-900/50 transition-all transform hover:-translate-y-0.5 mt-4">
                    Verify & Access Gallery
                </button>
            </form>
            
            <p class="text-xs text-center text-gray-500 mt-6">
                Only accepted guests from the official list can access the gallery.
            </p>
        </div>

        <!-- SUCCESS SECTION (Hidden by Default) -->
        <div id="successSection" class="hidden text-center">
            <div class="w-20 h-20 bg-yellow-500/10 border border-yellow-500/30 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            
            <h2 class="text-2xl font-bold text-white mb-2">Welcome, <span id="userName" class="text-yellow-500">Guest</span>!</h2>
            <p class="text-gray-400 mb-8">Your identity has been verified. You can now access the farewell drive folder.</p>
            
            <a href="https://drive.google.com/drive/folders/1SK2sMD3YQ0oTyxYaoo0QB95rKrcBoXLH?usp=sharing" target="_blank" class="block w-full bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 hover:to-yellow-500 text-black font-bold py-4 px-4 rounded-xl shadow-lg shadow-yellow-900/50 transition-all transform hover:-translate-y-1 mb-4 flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                Open Google Drive

            <button onclick="logout()" class="text-sm font-medium text-gray-500 hover:text-yellow-500 transition-colors">
                Sign Out

        </div>

        // Helper function to normalize inputted phone numbers (removes spaces, +, dashes, and country codes)
        function normalizePhone(phoneStr) {
            let cleaned = phoneStr.replace(/[\s\+\-]/g, '');
            if (cleaned.startsWith('91') && cleaned.length > 10) {
                cleaned = cleaned.substring(2);
            }
            return cleaned;
        }

        // Helper function to normalize names and make comparison intelligent
        function matchName(storedName, inputName) {
            // Convert both to lowercase and remove any multiple spaces
            const sName = storedName.toLowerCase().trim().replace(/\s+/g, ' ');
            const iName = inputName.toLowerCase().trim().replace(/\s+/g, ' ');
            
            // Scenario 1: Exact match (case-insensitive)
            if (sName === iName) return true;
            
            // Scenario 2: First Name only match
            const sFirst = sName.split(' ')[0];
            if (iName === sFirst) return true;

            return false;
        }

        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            let rawId = document.getElementById('ticketId').value.trim().toUpperCase();
            // Automatically handle if they typed the number only, or accidentally included PHY
            if (rawId.startsWith('PHY')) {
                rawId = rawId.replace('PHY', '').replace('-', '').trim();
            }
            const inputId = `PHY-${rawId}`;
            
            const inputName = document.getElementById('name').value;
            const inputPhone = normalizePhone(document.getElementById('phone').value.trim());
            const errorMsg = document.getElementById('errorMessage');

            // Search for the user matching all three criteria
            const authenticatedUser = guestData.find(guest => {
                const guestId = guest.id.toUpperCase();
                const guestPhone = normalizePhone(guest.phone);
                
                const isIdMatch = (guestId === inputId);
                const isPhoneMatch = (guestPhone === inputPhone);
                const isNameMatch = matchName(guest.name, inputName);

                return isIdMatch && isPhoneMatch && isNameMatch;
            });

            if (authenticatedUser) {
                // Success!
                errorMsg.classList.add('hidden');
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('successSection').classList.remove('hidden');
                
                // Format name: capitalize first letters for the welcome message
                const formattedName = authenticatedUser.name.replace(/\b\w/g, char => char.toUpperCase());
                document.getElementById('userName').textContent = formattedName;
                
                // Clear form for security
                document.getElementById('authForm').reset();
            } else {
                // Failed login
                errorMsg.classList.remove('hidden');
                // Shake effect on the card
                const card = document.querySelector('.glass-card');
                card.classList.add('animate-pulse');
                setTimeout(() => card.classList.remove('animate-pulse'), 500);
            }
        });

        function logout() {
            document.getElementById('successSection').classList.add('hidden');
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('ticketId').focus();
